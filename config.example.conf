# local-dns 設定ファイル
# 形式: 「キー: 値」を1行に1つ。行頭の # はコメント。値を空にすると既定値。
# 変更後は `sudo systemctl restart local-dns` で反映されます。

# ---- DNS ----

# 管理するドメイン (この配下の名前を local-dns が応答します)
# 例: nas.home.arpa / 好みで "lan" や "home" などに変更可
domain: home.arpa

# DNS の待ち受けアドレス (UDP/TCP 両方)。
# 特定の IP に絞る場合は "192.168.1.2:53" のように指定。
dns_listen: :53

# 上流 DNS リゾルバ (カンマ区切り、フォールバック順)。
# ルーターを指定すると (例: 192.168.1.1) ルーター配布の名前も引き続き解決できます。
upstreams: 1.1.1.1, 8.8.8.8

# 管理レコードの TTL 秒。小さいほど IP 変更への追従が速い。
ttl: 30

# ドット無しの単一ラベル問い合わせ ("nas" など) にも応答するか
answer_single_label: true

# ---- スキャン ----

# ネットワークスキャンの間隔 (例: 30s, 1m)。IP 変更はおおよそこの間隔で追従します。
scan_interval: 30s

# スキャン対象サブネットの上書き (通常は自動検出)。例: 192.168.1.0/24
scan_cidr:

# スキャンに使うインタフェースの固定 (通常は自動検出)。例: eth0
scan_interface:

# アクティブスイープ (各ホストへの小さな UDP 送信) を無効化して
# 受動的な ARP 監視のみにする場合は true
disable_sweep: false

# ---- Web UI ----

# Web 管理画面の待ち受けアドレス
web_listen: :8080

# Basic 認証 (両方設定した場合のみ有効)
web_username:
web_password:

# ---- その他 ----

# デバイス・マッピングの保存先
state_path: /var/lib/local-dns/state.json

# MAC ベンダー辞書 (OUI) の追加パス (カンマ区切り)。
# 既定で ieee-data / nmap / wireshark の標準パスを自動検出します。
oui_paths:

# ログレベル: debug / info / warn / error
log_level: info
